<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(arr) {
        let answer = 0;
        let count = 0;

        for (let i = 0; i < arr.length; i++) {
          if (arr[i] === 1) {
            count += 1;
          } else {
            count = 0;
          }
          answer += count;
        }

        return answer;
      }

      console.log(solution([1, 0, 1, 1, 1, 0, 0, 1, 1, 0]));
    </script>
  </body>
</html>
