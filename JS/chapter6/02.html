<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(str) {
        let answer;
        const stack = [];

        for (let x of str) {
          if (x === ")") {
            while (stack.pop() !== "(") {
              continue;
            }
          } else {
            stack.push(x);
          }
        }
        answer = stack.join("");

        return answer;
      }

      console.log(solution("(A(BC)D)EF(G(H)(IJ)K)LM(N)"));
    </script>
  </body>
</html>
