<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 깊이 우선 탐색 -->
    <script>
      function solution(n) {
        let answer = [];
        let check = Array.from({ length: n + 1 }, () => 0);

        function DFS(v) {
          if (v === n + 1) {
            for (let i = 1; i <= n; i++) {
              answer.push(i);
            }

            return;
          } else {
            check[v] = 1;
            DFS(v + 1);
            check[v] = 0;
            DFS(v + 1);
          }
        }

        DFS(n);
        return answer;
      }

      console.log(solution([1, 3, 5, 6, 7, 10]));
    </script>
  </body>
</html>
