<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let data = [
        "   + -- + - + -   ",
        "   + --- + - +   ",
        "   + -- + - + -   ",
        "   + - + - + - +   ",
      ];

      function solution(data) {
        let answer = "";
        for (var str of data) {
          // 2진수 -> 10진수 -> 문자 인코딩
          answer += String.fromCharCode(
            parseInt(
              str.replace(/ /g, "").replace(/\+/g, "1").replace(/-/g, "0"),
              2
            )
          );
        }
        return answer;
      }

      console.log(solution(data));
    </script>
  </body>
</html>
