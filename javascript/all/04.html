<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 페이지 교체 알고리즘: LRU -->
    <script>
      const type = [
        "척추동물",
        "어류",
        "척추동물",
        "무척추동물",
        "파충류",
        "척추동물",
        "어류",
        "파충류",
      ];
      function solution(animals, page) {
        const chair = [];
        let answer = 0;
        for (var animal of animals) {
          if (chair.length < page) {
            if (chair.includes(animal)) {
              chair.splice(chair.indexOf(animal), 1);
              chair.push(animal);
              answer += 1;
            } else {
              chair.push(animal);
              answer += 60;
            }
          } else {
            if (chair.includes(animal)) {
              chair.splice(chair.indexOf(animal), 1);
              chair.push(animal);
              answer += 1;
            } else {
              chair.shift();
              chair.push(animal);
              answer += 60;
            }
          }
        }
        return `${parseInt(answer / 60, 10)}분, ${answer % 60}초`;
      }
      console.log(solution(type, 3));
    </script>
  </body>
</html>
