<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(arr) {
        let maxNumber = arr[0];

        for (let i = 0; i < arr.length; i++) {
          if (maxNumber < arr[i]) {
            maxNumber = arr[i];
          }
        }
        return [maxNumber, arr.sort()[0]];
      }

      console.log(solution([10, 20, 30, 1, -2, 3, 5, 9, 11, 0]));
    </script>
  </body>
</html>
