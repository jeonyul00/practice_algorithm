<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(a, b, c) {
        let answer = true;
        let max;
        let sum = a + b + c;

        if (a < b) {
          max = b;
        } else {
          max = a;
        }
        if (c > max) {
          max = c;
        }
        if (sum - max <= max) {
          answer = false;
        }
        return answer;
      }

      console.log(solution(6, 7, 11));
      console.log(solution(13, 33, 17));
    </script>
  </body>
</html>
