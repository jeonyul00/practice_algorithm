<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(str) {
        let answer = 0;
        for (let x of str) {
          if (x === x.toUpperCase()) {
            answer++;
          }
        }
        return answer;
      }

      console.log(solution("KoreaTimeGood"));
    </script>
  </body>
</html>
