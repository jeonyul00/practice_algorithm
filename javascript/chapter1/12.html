<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(str) {
        let answer = "";
        for (let x of str) {
          answer += x.toUpperCase();
        }
        return answer;
      }
      console.log(solution("MyNameIsJeonYul"));
    </script>
  </body>
</html>
