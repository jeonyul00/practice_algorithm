<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(strArr) {
        let answer;
        let max = Number.MIN_SAFE_INTEGER;
        for (let x of strArr) {
          if (x.length > max) {
            max = x.length;
            answer = x;
          }
        }

        return answer;
      }

      console.log(solution(["ab", "abc", "abcd"]));
    </script>
  </body>
</html>
