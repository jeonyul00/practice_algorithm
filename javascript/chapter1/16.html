<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(str) {
        let answer = "";
        for (let i = 0; i < str.length; i++) {
          if (str.indexOf(str[i]) === i) {
            answer += str[i];
          }
        }

        return answer;
      }

      console.log(solution("ksekkset"));
    </script>
  </body>
</html>
