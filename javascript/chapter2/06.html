<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(arr) {
        let answer = Number.MIN_SAFE_INTEGER;
        const length = arr.length;
        let sumRow = 0;
        let sumColumn = 0;

        for (let i = 0; i < length; i++) {
          sumRow = 0;
          sumColumn = 0;
          for (let j = 0; j < length; j++) {
            sumRow += arr[i][j];
            sumColumn += arr[j][i];
          }
          answer = Math.max(answer, sumColumn, sumRow);
        }
        sumRow = 0;
        sumColumn = 0;
        // 대각선
        for (let i = 0; i < arr.length; i++) {
          sumRow += arr[i][i];
          sumColumn += arr[i][arr.length - i - 1];
        }
        answer = Math.max(answer, sumColumn, sumRow);
        return answer;
      }

      console.log(
        solution([
          [10, 13, 10, 12, 15],
          [12, 39, 30, 23, 11],
          [11, 25, 50, 53, 15],
          [19, 27, 29, 37, 27],
          [19, 13, 30, 13, 19],
        ])
      );
    </script>
  </body>
</html>
