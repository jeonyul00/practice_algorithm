<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(str, char) {
        const answer = [];
        let p = 100;

        for (let x of str) {
          if (x === char) {
            p = 0;
            answer.push(p);
          } else {
            p++;
            answer.push(p);
          }
        }
        p = 100;
        for (let i = str.length - 1; i >= 0; i--) {
          if (str[i] === char) {
            p = 0;
            answer[i] = p;
          } else {
            p++;
            answer[i] = Math.min(answer[i], p);
          }
        }

        return answer;
      }
      console.log(solution("teachermode", "e"));
    </script>
  </body>
</html>
