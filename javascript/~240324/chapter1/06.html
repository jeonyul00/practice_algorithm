<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(...num) {
        let answer = [];
        [...num].forEach((v) => {
          if (v % 2 === 0) {
            answer.push("짝수");
          } else {
            answer.push("홀수");
          }
        });
        return answer;
      }
      console.log(solution(3, 2, 1, 6, 66, 12));
    </script>
  </body>
</html>
