<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function solution(str, char) {
        let answer = 0;
        for (let i of str) {
          if (i === char) {
            answer++;
          }
        }
        return answer;
      }
      console.log(solution("COMPUTERPROGRAMING", "R"));
    </script>
  </body>
