<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 깊이 우선 탐색 -->
    <script>
      function solution(arr) {
        let answer = "no";
        let total = arr.reduce((a, b) => a + b, 0);
        let length = arr.length;

        function DFS(L, sum) {
          if (L === length) {
            if (total - sum === sum) {
              answer = "yes";
              console.log();
            }
            return;
          } else {
            DFS(L + 1, sum + arr[L]);
            DFS(L + 1, sum);
          }
        }
        DFS(0, 0);
        return answer;
      }

      console.log(solution([1, 3, 5, 6, 7, 10]));
    </script>
  </body>
</html>
