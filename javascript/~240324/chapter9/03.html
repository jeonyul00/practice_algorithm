<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 넓이 우선 탐색 -->
    <script>
      function solution() {
        let answer;
        const queue = [];

        queue.push(1);
        while (queue.length) {
          let v = queue.shift();
          answer += v;
          for (let nv of [v * 2, v * 2 + 1]) {
            if (nv > 7) {
              continue;
            }
            queue.push(nv);
          }
        }

        return answer;
      }

      console.log(solution());
    </script>
  </body>
</html>
