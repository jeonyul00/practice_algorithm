<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 0 ~ n 까지의 합 : (n * (n + 1)) / 2
      const maxNumber = 100;
      let totalNumber = 0;

      for (var i = 0; i < maxNumber + 1; i++) {
        totalNumber += i;
      }

      // 1
      // console.log(totalNumber); // 5050
      // 2
      // console.log((maxNumber * (maxNumber + 1)) / 2); // 5050

      // 3. 재귀함수
      // 100 + (99 + (98 + (... + (2 + 1)...)))
      function solution1(maxNumber) {
        if (maxNumber <= 1) {
          return 1;
        }
        return maxNumber + solution1(maxNumber - 1);
      }
      // console.log(solution1(maxNumber)); // 5050

      // 2진수 변환 재귀함수
      function solution2(num) {
        if (num === 1 || num === 0) {
          return String(num);
        }
        return solution2(Math.floor(num / 2)) + String(num % 2);
      }

      // 문자열 뒤집기 재귀함수
      function solution3(str) {
        if (str.length === 1) {
          return str;
        }
        return str[str.length - 1] + solution3(str.slice(0, str.length - 1));
      }

      // 피보나치 순열
      // 1 1 2 3 5 8 13 21 34 ...
      function solution4(num) {
        if (num === 1 || num === 2) {
          return 1;
        }
        return solution4(num - 1) + solution4(num - 2);
      }
      console.log(solution4(6));
    </script>
  </body>
</html>
