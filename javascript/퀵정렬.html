<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const arr = [1, 2, 3, 4, 12, 10, 29, 11];
      function solution(arr) {
        const length = arr.length;
        if (length <= 1) {
          return arr;
        }
        let standard = [arr.shift()];
        let group1 = [];
        let group2 = [];

        for (let i in arr) {
          if (arr[i] < standard) {
            group1.push(arr[i]);
          } else {
            group2.push(arr[i]);
          }
        }
        return solution(group1).concat(standard, solution(group2));
      }
      console.log(solution(arr));
    </script>
  </body>
</html>
